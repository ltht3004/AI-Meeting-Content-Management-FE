<div class="layout-wrapper">
  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Top Header -->
    <header class="main-header">
      <!-- Global Search Box -->
      <div class="search-box">
        <span class="material-icons-round search-icon">search</span>
        <input 
          type="text" 
          placeholder="Search meetings or transcripts..." 
          [ngModel]="searchService.searchQuery()"
          (ngModelChange)="searchService.setQuery($event)"
          class="search-input"
        >
        @if (searchService.searchQuery()) {
          <button
            type="button"
            class="clear-search-btn"
            aria-label="Clear search"
            title="Clear search"
            (click)="searchService.setQuery('')"
          >
            <span class="material-icons-round">close</span>
          </button>
        }
      </div>

      <!-- Right Header Actions -->
      <div class="header-right">
        <!-- User info -->
        <a routerLink="/profile" class="user-profile" aria-label="Open profile">
          <div class="user-details">
            <span class="user-name">{{ authService.currentUser()?.full_name || 'User' }}</span>
            <span class="user-role">{{ authService.currentUser()?.role === 'admin' ? 'Enterprise Admin' : 'User' }}</span>
          </div>
          <div class="avatar-box">
            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="User Avatar" class="avatar-img">
          </div>
        </a>
      </div>
    </header>

    <!-- Dynamic Routed Content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
